<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player Training Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    .drill {
      display: flex;
      align-items: center;
      margin: 10px 0;
      padding: 10px;
      background: #eef2ff;
      border-radius: 8px;
    }
    .drill input {
      margin-right: 10px;
      transform: scale(1.3);
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Player Training Tracker</h2>

  <p><strong>Check off the drills you completed today:</strong></p>

  <div class="drill">
    <input type="checkbox" id="drill1">
    <label for="drill1">Cone Dribbling</label>
  </div>

  <div class="drill">
    <input type="checkbox" id="drill2">
    <label for="drill2">Gate Passing</label>
  </div>

  <div class="drill">
    <input type="checkbox" id="drill3">
    <label for="drill3">1v1 Attacking</label>
  </div>

  <div class="drill">
    <input type="checkbox" id="drill4">
    <label for="drill4">Shooting Accuracy</label>
  </div>

  <button id="saveProgressBtn">Save Progress</button>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="firebase-progress.js"></script>

</body>
</html>
