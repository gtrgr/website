<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coach Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="firebase.js"></script>
  <script defer src="firebase-auth.js"></script>
  <script defer src="firebase-progress.js"></script>
</head>

<body>

  <div class="dashboard-container">

    <header class="dashboard-header">
      <h1>Coach Dashboard</h1>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>

    <div class="dashboard-grid">

      <!-- Team List -->
      <section class="card">
        <h2>Team Roster</h2>
        <ul id="playerList"></ul>
      </section>

      <!-- Player Stats -->
      <section class="card">
        <h2>Player Stats</h2>
        <div id="playerStats">Select a player to view stats</div>
      </section>

      <!-- Attendance -->
      <section class="card">
        <h2>Attendance</h2>
        <div id="attendanceList">Select a player to view attendance</div>
      </section>

      <!-- Notes -->
      <section class="card">
        <h2>Coach Notes</h2>
        <textarea id="coachNotes" placeholder="Write notes here..."></textarea>
        <button id="saveNotesBtn">Save Notes</button>
      </section>

    </div>

  </div>

</body>
</html>
