<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coach Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    .player-card {
      background: #eef2ff;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    textarea {
      width: 100%;
      height: 70px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Coach Dashboard</h2>
  <p><strong>View player progress and add notes:</strong></p>

  <div id="playersList"></div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="firebase-progress.js"></script>

</body>
</html>
